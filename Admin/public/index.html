<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Carbone Stellaire Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local</p>
          <h1>Carbone Stellaire Admin</h1>
        </div>
        <div class="topbar__actions">
          <button type="button" class="button button--ghost" data-action="refresh">Rafraîchir</button>
          <button type="button" class="button button--primary" data-action="deploy">Déployer localement</button>
        </div>
      </header>

      <section class="workspace">
        <nav class="tabs" aria-label="Sections">
          <button type="button" class="tab is-active" data-tab="site">Contenu</button>
          <button type="button" class="tab" data-tab="categories">Gammes</button>
          <button type="button" class="tab" data-tab="products">Couteaux</button>
          <button type="button" class="tab" data-tab="deploy">Déploiement</button>
        </nav>

        <section class="panel" id="panel-site"></section>
        <section class="panel" id="panel-categories" hidden></section>
        <section class="panel" id="panel-products" hidden></section>
        <section class="panel" id="panel-deploy" hidden></section>

        <aside class="status">
          <div class="status__header">
            <div>
              <p class="eyebrow">État</p>
              <strong id="deploy-status">idle</strong>
            </div>
            <a id="preview-link" class="preview-link" href="#" target="_blank" rel="noreferrer" hidden>Preview</a>
          </div>
          <pre id="deploy-log" aria-live="polite"></pre>
        </aside>
      </section>
    </main>

    <template id="locale-section-template">
      <section class="section-editor">
        <label>
          <span>Titre</span>
          <input type="text" data-field="title" />
        </label>
        <label>
          <span>Markdown</span>
          <textarea data-field="body" rows="8"></textarea>
        </label>
      </section>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
